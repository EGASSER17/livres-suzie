<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LivresIA — Recommandations</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<nav class="navbar">
  <a href="dashboard.html" class="navbar-brand">LivresIA</a>
  <div class="navbar-right">
    <a href="favorites.html" class="btn btn-outline btn-sm">❤️ Favoris</a>
    <a href="dashboard.html" class="btn btn-outline btn-sm">Tableau de bord</a>
  </div>
</nav>

<!-- Loader -->
<div class="loader-overlay" id="loader">
  <div class="spinner"></div>
  <p>Chargement de vos livres…</p>
</div>

<div class="page-container" id="main-content" style="display:none">

  <div class="results-header">
    <h1>Vos 10 recommandations</h1>
    <p id="results-date" style="opacity:.55;font-size:.9rem"></p>
  </div>

  <!-- Critères utilisés -->
  <div id="criteria-summary" style="display:flex;flex-wrap:wrap;gap:.4rem;justify-content:center;margin-bottom:2rem"></div>

  <hr class="divider" />

  <!-- Livres -->
  <div class="books-grid" id="books-grid">
    <!-- Rempli par JS -->
  </div>

  <!-- Actions -->
  <div class="results-actions">
    <a href="questionnaire.html" class="btn btn-primary btn-lg">
      Nouvelle recherche
    </a>
    <a href="dashboard.html" class="btn btn-ghost btn-lg">
      Retour au tableau de bord
    </a>
  </div>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<script type="module">
  import { requireAuth } from './js/auth.js';
  import { loadRecommendation, formatDate, buildBookCard, fetchCoverUrl } from './js/results.js';
  import { loadFavorites, addFavorite, removeFavorite, buildFavMap } from './js/favorites.js';

  function showToast(msg, type = 'info') {
    const tc = document.getElementById('toast-container');
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    tc.appendChild(t);
    setTimeout(() => t.remove(), 5000);
  }

  // Guard auth
  const user = await requireAuth();
  if (!user) throw new Error('Non authentifié');

  // Récupérer l'ID depuis l'URL
  const params = new URLSearchParams(window.location.search);
  const recId  = params.get('id');

  if (!recId) {
    window.location.href = 'dashboard.html';
    throw new Error('Pas d\'ID');
  }

  try {
    const rec = await loadRecommendation(recId);

    // Afficher la date
    document.getElementById('results-date').textContent =
      'Générées le ' + formatDate(rec.created_at);

    // Afficher les critères
    const criteriaEl = document.getElementById('criteria-summary');
    const q = rec.questionnaire;
    const allCriteria = [
      ...(q.genres  || []),
      ...(q.styles  || []),
      ...(q.keywords || []),
      q.age,
      q.level,
    ].filter(Boolean);

    allCriteria.forEach(c => {
      const span = document.createElement('span');
      span.className = 'tag gold';
      span.textContent = c;
      criteriaEl.appendChild(span);
    });

    // Récupérer pochettes et favoris en parallèle
    const [covers, existingFavs] = await Promise.all([
      Promise.all(rec.books.map(book => fetchCoverUrl(book.title, book.author))),
      loadFavorites(user.id),
    ]);
    const favMap = buildFavMap(existingFavs);

    // Afficher les livres
    const grid = document.getElementById('books-grid');
    rec.books.forEach((book, i) => {
      const favId = favMap[`${book.title}||${book.author}`] || '';
      grid.innerHTML += buildBookCard(book, i, covers[i], favId);
    });

    // Attacher les événements cœur
    grid.querySelectorAll('.book-heart').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (btn.classList.contains('loading')) return;
        btn.classList.add('loading');
        const title  = btn.dataset.title;
        const author = btn.dataset.author;
        const favId  = btn.dataset.favId;
        try {
          if (favId) {
            await removeFavorite(favId);
            btn.classList.remove('active');
            btn.textContent = '🤍';
            btn.dataset.favId = '';
            btn.title = 'Ajouter aux favoris';
          } else {
            const book = rec.books.find(b => b.title === title && b.author === author);
            const newId = await addFavorite(user.id, book, rec.id);
            btn.classList.add('active');
            btn.textContent = '❤️';
            btn.dataset.favId = newId;
            btn.title = 'Retirer des favoris';
          }
        } catch (e) {
          showToast('Erreur, réessayez.', 'error');
        } finally {
          btn.classList.remove('loading');
        }
      });
    });

    document.getElementById('loader').classList.add('hidden');
    document.getElementById('main-content').style.display = 'block';

  } catch (err) {
    console.error(err);
    document.getElementById('loader').classList.add('hidden');
    showToast('Impossible de charger les recommandations.', 'error');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 2500);
  }
</script>

</body>
</html>
